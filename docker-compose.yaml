# =========================================================
# Adaptive Stealth Network — Docker Compose
# =========================================================

version: "3.9"

services:
  backend:
    build: .
    container_name: asn-backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/asn_database.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: asn-tunnel
    restart: unless-stopped
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    entrypoint: /bin/sh
    command: >
      -c "
      if [ -z \"$$CLOUDFLARE_TUNNEL_TOKEN\" ]; then
        echo '[*] No tunnel token provided. Starting Quick Tunnel...';
        /usr/local/bin/cloudflared tunnel --url http://backend:8000;
      else
        echo '[*] Starting persistent tunnel with token...';
        /usr/local/bin/cloudflared tunnel --no-autoupdate run --token $$CLOUDFLARE_TUNNEL_TOKEN;
      fi"
    depends_on:
      - backend

volumes:
  data:
  logs:
